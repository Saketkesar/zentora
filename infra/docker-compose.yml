services:
  frontend:
    build:
      context: ../frontend-next
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://10.25.115.100/api
      - NEXT_PUBLIC_SITE_ORIGIN=http://10.25.115.100
    depends_on:
      - backend
    networks:
      - zentora_net

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
    depends_on:
      - frontend
      - backend
    networks:
      - zentora_net

  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
    volumes:
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ./certs
        target: /etc/nginx/certs
        read_only: true
    depends_on:
      - frontend
      - backend
    networks:
      - zentora_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/zentora
      - JWT_SECRET=change-me
      - GANACHE_RPC_URL=http://ganache:8545
      - GANACHE_PRIVATE_KEY=
    volumes:
      - backend-data:/app/data
    networks:
      - zentora_net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zentora
    ports:
      - "5432:5432"
    volumes:
      - zentora-pg:/var/lib/postgresql/data
    networks:
      - zentora_net

  ganache:
    image: trufflesuite/ganache:latest
    command: --host 0.0.0.0 --port 8545 --chain.vmErrorsOnRPCResponse true --wallet.totalAccounts 10 --wallet.defaultBalance 1000
    ports:
      - "8545:8545"
    networks:
      - zentora_net

volumes:
  zentora-pg:
  backend-data:

networks:
  zentora_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.123.0.0/16
