server {
    listen 80;
    server_name zentora.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zentora.local;

    ssl_certificate     /etc/nginx/certs/zentora.local.pem;
    ssl_certificate_key /etc/nginx/certs/zentora.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    client_max_body_size 20m;

    # Serve mkcert root CA to allow other devices to trust local TLS (optional)
    location = /mkcert-rootCA.pem {
        default_type application/x-pem-file;
        add_header Cache-Control "public, max-age=3600";
        alias /mkcert/rootCA.pem;
    }

    # Backend WebSocket proxy for alerts/RFID (wss://zentora.local/ws/*)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Direct IoT verify endpoint to backend (devices call https://zentora.local/api/rfid/verify)
    location ^~ /api/rfid/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend reverse proxy (everything else)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
